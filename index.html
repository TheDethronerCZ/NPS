<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>NPS vSUNSET</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- BACKGROUND -->
  <canvas id="bg"></canvas>

  <div class="sunset-horizon"></div>

  <!-- LOGO -->
  <a class="logo" href="index.html">
    NPS v<span>SUNSET</span>
  </a>

  <!-- NAV -->
  <nav class="nav">

    <a href="index.html">Home</a>

    <a href="levels.html">Levels</a>

    <a href="demons.html">Demons</a>

    <a href="submit.html">Submit</a>

    <a href="leader.html">Leaderboard</a>

    <a href="download.html">Download</a>

    <a href="account.html">Account</a>

  </nav>

  <!-- PAGE -->
  <main class="page">

    <!-- HERO -->
    <section class="hero">


      <h1>
        v<span>SUNSET</span>
      </h1>

      <p>
        Seasonal Geometry Dash competition.
      </p>

    </section>

    <!-- FEATURED -->
    <section class="card featured">

      <div class="featured-top">

        <span>ID: 000001</span>

        <span>Featured Level</span>

        <span>+25 SP</span>

      </div>

      <h2>Sunset Horizon</h2>

    </section>

    <!-- CHALLENGES -->
    <section class="card">

      <h2>Seasonal Challenges</h2>

      <ul class="challenge-list">

        <li>Beat an Extreme Demon</li>

        <li>Get 10 Creator Points</li>

        <li>Make an Epic Level</li>

        <li>Draw Sunset Art in Editor</li>

      </ul>

    </section>

  </main>

  <!-- TOGGLES -->
  <button id="ldmToggle" class="toggle-btn">
    LDM: OFF
  </button>

  <button
    id="musicToggle"
    class="toggle-btn music-btn"
  >
    Music: OFF
  </button>

  <!-- AUDIO -->
  <audio
    id="bgMusic"
    loop
    preload="auto"
  >
    <source
      src="assets/music/sunset.mp3"
      type="audio/mpeg"
    >
  </audio>

  <!-- SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="particles.js"></script>
  <script src="app.js"></script>

</body>
</html>
