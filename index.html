<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>NPS Sunset</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <!-- BACKGROUND -->
  <canvas id="bg"></canvas>

  <div class="sun-glow"></div>

  <div class="grid-overlay"></div>

  <!-- MUSIC -->
  <audio id="bgMusic" loop>
    <source
      src="assets/audio/sunset.mp3"
      type="audio/mpeg">
  </audio>

  <!-- TOPBAR -->
  <header class="topbar">

    <div class="brand">
      NPS <span>SUNSET</span>
    </div>

    <div class="top-controls">

      <button id="musicToggle">
        MUSIC OFF
      </button>

      <button id="auraToggle">
        AURA OFF
      </button>

    </div>

  </header>

  <!-- MAIN -->
  <main class="menu-scene">

    <section class="hero">

      <h1>
        NPS <span>SUNSET</span>
      </h1>

      <p>
        A new generation GDPS.
      </p>

    </section>

    <!-- MENU -->
    <section class="menu-buttons">

      <a href="levels.html" class="menu-btn">
        PLAY
      </a>

      <a href="demons.html" class="menu-btn">
        DEMONS
      </a>

      <a href="leaderboard.html" class="menu-btn">
        LEADERBOARD
      </a>

      <a href="submit.html" class="menu-btn">
        SUBMIT
      </a>

      <a href="account.html" class="menu-btn">
        ACCOUNT
      </a>

    </section>

    <!-- PANELS -->
    <section class="panels">

      <div class="panel">

        <h2>🌟 Featured Level</h2>

        <p>
          Coming soon...
        </p>

      </div>

      <div class="panel">

        <h2>🔥 Season Challenge</h2>

        <p>
          Coming soon...
        </p>

      </div>

    </section>

  </main>

  <!-- SCRIPTS -->
  <script src="scripts/particles.js"></script>
  <script src="scripts/audio.js"></script>
  <script src="scripts/core.js"></script>

</body>
</html>
