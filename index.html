<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NPS SUNSET</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- BACKGROUND -->
  <canvas id="bg"></canvas>
  <div class="fog"></div>
  <div class="grid"></div>

  <!-- MUSIC -->
  <audio id="music" loop>
    <source src="assets/audio/sunset.mp3" type="audio/mpeg">
  </audio>

  <!-- TOP BAR -->
  <header class="topbar">

    <div class="brand">
      NPS <span>SUNSET</span>
    </div>

    <div class="controls">
      <button id="musicBtn">MUSIC</button>
      <button id="viewHome">HOME</button>
      <button id="viewLevels">LEVELS</button>
      <button id="viewDemons">DEMONS</button>
      <button id="viewLeaderboard">LEADERBOARD</button>
    </div>

  </header>

  <!-- APP -->
  <main class="app">

    <section id="home" class="view active">
  <main class="app">

  <div id="transitionLayer"></div>

  <section id="home" class="view active">
    <h1>WELCOME</h1>
  </section>

  <section id="levels" class="view">
    <h1>LEVELS</h1>
  </section>

  <section id="demons" class="view">
    <h1>DEMONS</h1>
  </section>

  <section id="leaderboard" class="view">
    <h1>LEADERBOARD</h1>
  </section>

</main>

  </main>

  <script src="core.js"></script>

</body>

</html>
