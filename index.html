<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NPS - New Private Server</title>

  <link rel="stylesheet" href="style.css"/>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

  <header class="header">
    <h1>NPS</h1>
    <p>New Private Server</p>
  </header>

  <main class="container">

    <!-- LOGIN -->
    <section class="card">
      <h2>Account</h2>

      <input id="email" type="email" placeholder="Email"/>
      <input id="password" type="password" placeholder="Password"/>

      <div class="row">
        <button onclick="login()">Login</button>
        <button onclick="logout()">Logout</button>
      </div>

      <p id="status"></p>
    </section>

    <!-- LEVELS -->
    <section class="card">
      <div class="row space">
        <h2>Hardest Levels</h2>
        <button onclick="loadLevels()">Load</button>
      </div>

      <div id="levels"></div>
    </section>

  </main>

  <script>
    // =========================
    // SUPABASE INIT (YOUR PROJECT)
    // =========================
    const supabaseUrl = "https://ftgvhycaffzuwajihajz.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0Z3ZoeWNhZmZ6dXdhamloYWp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NDkzNzcsImV4cCI6MjA5NTAyNTM3N30.KgibDtXxGFhTEK33430fIcOa7kgqECrO0SohYq2idDU";

    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    // =========================
    // LOGIN
    // =========================
    async function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      const status = document.getElementById("status");

      if (error) {
        console.log(error);
        status.textContent = "Login failed ❌";
      } else {
        status.textContent = "Logged in ✅";
      }
    }

    async function logout() {
      await supabaseClient.auth.signOut();
      document.getElementById("status").textContent = "Logged out";
    }

    // =========================
    // LOAD LEVELS
    // =========================
    async function loadLevels() {
      const { data, error } = await supabaseClient
        .from("levels")
        .select("*")
        .order("point_award", { ascending: false });

      const container = document.getElementById("levels");
      container.innerHTML = "";

      if (error) {
        console.log(error);
        container.innerHTML = "<p>Failed to load levels ❌</p>";
        return;
      }

      data.forEach(level => {
        const div = document.createElement("div");
        div.className = "level";

        div.innerHTML = `
          <h3>${level.level_name}</h3>
          <p><b>Creator:</b> ${level.creator}</p>
          <p><b>Verifier:</b> ${level.verifier}</p>
          <p><b>Difficulty:</b> ${level.difficulty}</p>
          <p><b>Points:</b> ${level.point_award}</p>
          <p><b>Length:</b> ${level.length}</p>
          <p>${level.description ?? ""}</p>
          <a href="${level.video_url}" target="_blank">Video</a>
        `;

        container.appendChild(div);
      });
    }
  </script>

</body>
</html>
