<body>

  <canvas id="bg"></canvas>
  <div class="sun-glow"></div>

  <audio id="bgMusic" loop>
    <source src="assets/audio/sunset.mp3">
  </audio>

  <!-- NAV BAR -->
  <header class="topbar">

    <div class="brand">NPS <span>SUNSET</span></div>

    <div class="top-controls">
      <button onclick="showView('home')">HOME</button>
      <button onclick="showView('levels')">LEVELS</button>
      <button onclick="showView('demons')">DEMONS</button>
      <button onclick="showView('leaderboard')">LEADERBOARD</button>
    </div>

  </header>

  <!-- VIEWS CONTAINER -->
  <main id="app">

    <section id="home" class="view active">
      <h1>HOME</h1>
    </section>

    <section id="levels" class="view">
      <h1>LEVELS</h1>
    </section>

    <section id="demons" class="view">
      <h1>DEMONS</h1>
    </section>

    <section id="leaderboard" class="view">
      <h1>LEADERBOARD</h1>
    </section>

  </main>

</body>
