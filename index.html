<script>
  async function isAdmin() {
  const { data } = await supabase.auth.getUser();

  if (!data.user) return false;

  const res = await supabase
    .from("profiles")
    .select("is_admin")
    .eq("id", data.user.id)
    .single();

  return res.data?.is_admin;
}
</script>
