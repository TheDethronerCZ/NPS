<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <canvas id="bg"></canvas>
  <div class="horizon"></div>

  <a class="logo" href="index.html">
    NPS v<span>SUNSET</span>
  </a>

  <nav class="nav">
    <a href="index.html">Home</a>
    <a href="demons.html">Demons</a>
    <a href="levels.html">Levels</a>
    <a href="submit.html">Submit</a>
    <a href="rate.html">Rate</a>
    <a href="account.html">Account</a>
  </nav>

  <main class="page">

    <h1>Account</h1>

    <!-- USER INFO -->
    <div class="card">
      <h2>Profile</h2>
      <p id="usernameDisplay">Not logged in</p>
    </div>

    <!-- AUTH -->
    <div class="card">

      <h2>Login</h2>

      <input id="email" placeholder="Email">
      <input id="password" type="password" placeholder="Password">

      <button onclick="signUp()">Sign Up</button>
      <button onclick="logIn()">Log In</button>
      <button onclick="logOut()">Log Out</button>

    </div>

    <!-- STATS -->
    <div class="card">
      <h2>Stats</h2>
      <p id="creatorPoints">Creator Points: 0</p>
      <p id="demonPoints">Demon Points: 0</p>
      <p id="stars">Stars: 0</p>
    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>

</body>
</html>
