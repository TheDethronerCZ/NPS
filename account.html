<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NPS - Account</title>

  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

<a class="nps-top-left" href="index.html">
  <span class="nps-white">NPS</span>
  <span class="nps-sunset">vSUNSET</span>
</a>

<div class="page">

  <h1>Account</h1>

  <div class="card">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <input id="username" placeholder="Username">

    <button class="btn" onclick="signup()">Sign Up</button>
    <button class="btn" onclick="login()">Login</button>
    <button class="btn" onclick="logout()">Logout</button>

    <p id="status"></p>
  </div>

  <div class="card" id="userBox">
    <p>Not logged in</p>
  </div>

</div>

<script>
const supabase = window.supabase.createClient(
  "https://ftgvhycaffzuwajihajz.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0Z3ZoeWNhZmZ6dXdhamloYWp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NDkzNzcsImV4cCI6MjA5NTAyNTM3N30.KgibDtXxGFhTEK33430fIcOa7kgqECrO0SohYq2idDU"
);

async function signup() {
  const email = email.value;
  const password = password.value;
  const username = username.value;

  const { data, error } = await supabase.auth.signUp({
    email,
    password
  });

  if (error) return status.innerText = error.message;

  await supabase.from("profiles").insert([{
    id: data.user.id,
    username: username
  }]);

  status.innerText = "Account created";
}

async function login() {
  const { error } = await supabase.auth.signInWithPassword({
    email: email.value,
    password: password.value
  });

  status.innerText = error ? error.message : "Logged in";
}

async function logout() {
  await supabase.auth.signOut();
  status.innerText = "Logged out";
}

</script>

</body>
</html>
