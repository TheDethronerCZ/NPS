<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NPS - Account</title>

  <link rel="stylesheet" href="style.css">

  <!-- ONLY ONE SUPABASE IMPORT -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

<a class="nps-top-left" href="index.html">
  <span class="nps-white">NPS</span>
  <span class="nps-sunset">vSUNSET</span>
</a>

<div class="page">

  <h1>Account</h1>

  <div class="card">
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">

    <button class="btn" onclick="signup()">Sign Up</button>
    <button class="btn" onclick="login()">Login</button>
    <button class="btn" onclick="logout()">Logout</button>

    <p id="status"></p>
  </div>

  <div class="card">
    <p id="profileBox">Not logged in</p>
  </div>

</div>

<!-- POPUP -->
<div id="popup" class="popup hidden"></div>
<script>
/* =========================
   SUPABASE INIT (ONLY ONCE)
========================= */
const supabase = window.supabase.createClient(
  "https://ftgvhycaffzuwajihajz.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0Z3ZoeWNhZmZ6dXdhamloYWp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NDkzNzcsImV4cCI6MjA5NTAyNTM3N30.KgibDtXxGFhTEK33430fIcOa7kgqECrO0SohYq2idDU"
);

/* =========================
   POPUP SYSTEM
========================= */
function showPopup(message) {
  const popup = document.getElementById("popup");

  popup.innerText = message;
  popup.classList.remove("hidden");

  setTimeout(() => {
    popup.classList.add("hidden");
  }, 2000);
}

/* =========================
   SIGN UP
========================= */
async function signup() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  const email = username + "@nps.local";

  const { data, error } = await supabase.auth.signUp({
    email,
    password
  });

  if (error) return showPopup(error.message);

  await supabase.from("profiles").insert([{
    id: data.user.id,
    username
  }]);

  showPopup("Sign up successful!");
}

/* =========================
   LOGIN
========================= */
async function login() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  const email = username + "@nps.local";

  const { error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if (error) return showPopup(error.message);

  showPopup("Login successful!");
}

/* =========================
   LOGOUT
========================= */
async function logout() {
  await supabase.auth.signOut();
  showPopup("Logged out!");
}
</script>

</body>
</html>
