<!DOCTYPE html>
<html lang="en">
<head>
  <a class="nps-top-left" href="https://thedethronercz.github.io/NPS/index.html">
  <span class="nps-white">NPS</span>
  <span class="nps-version">vSUNSET</span>
</a>
  <meta charset="UTF-8">
  <title>Admin Panel</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

  <div class="card">
    <h1>Admin Panel</h1>
    <p id="status">Checking access...</p>
  </div>

  <div class="card" id="admin-content" style="display:none;">
    <h2>Add Level</h2>

    <input id="name" placeholder="Level Name">
    <input id="creator" placeholder="Creator">
    <input id="verifier" placeholder="Verifier">

    <select id="difficulty">
      <option>Easy Demon</option>
      <option>Medium Demon</option>
      <option>Hard Demon</option>
      <option>Insane Demon</option>
      <option>Extreme Demon</option>
    </select>

    <input id="points" type="number" placeholder="Points">
    <input id="length" placeholder="Length">
    <input id="video" placeholder="Video URL">
    <textarea id="desc" placeholder="Description"></textarea>

    <button onclick="addLevel()">Add Level</button>
  </div>

  <script>
    if (user.id !== "YOUR_USER_UUID") {
  location.href = "index.html";
}
    const supabaseUrl = "https://ftgvhycaffzuwajihajz.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0Z3ZoeWNhZmZ6dXdhamloYWp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NDkzNzcsImV4cCI6MjA5NTAyNTM3N30.KgibDtXxGFhTEK33430fIcOa7kgqECrO0SohYq2idDU";

    const supabase = supabase.createClient(supabaseUrl, supabaseKey);

    let currentUser = null;

    async function checkAdmin() {
      const { data: { user } } = await supabase.auth.getUser();

      if (!user) {
        document.getElementById("status").innerText = "Not logged in";
        return;
      }

      currentUser = user;

      const { data: profile } = await supabase
        .from("profiles")
        .select("role")
        .eq("id", user.id)
        .single();

      if (!profile || profile.role !== "admin") {
        document.getElementById("status").innerText = "Access denied ❌";
        return;
      }

      document.getElementById("status").innerText = "Admin access granted ✅";
      document.getElementById("admin-content").style.display = "block";
    }

    async function addLevel() {
      const { error } = await supabase
        .from("levels")
        .insert([{
          level_name: document.getElementById("name").value,
          creator: document.getElementById("creator").value,
          verifier: document.getElementById("verifier").value,
          difficulty: document.getElementById("difficulty").value,
          point_award: parseInt(document.getElementById("points").value),
          length: document.getElementById("length").value,
          description: document.getElementById("desc").value,
          video_url: document.getElementById("video").value
        }]);

      if (error) {
        console.log(error);
        alert("Failed to add level");
      } else {
        alert("Level added!");
      }
    }

    checkAdmin();
  </script>

</body>
</html>
