<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NPS - Levels</title>

  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

  <div class="page">

    <h1 class="title">Levels</h1>

    <!-- GRID -->
    <div id="grid" class="grid"></div>

    <a href="index.html" class="btn">Back</a>

  </div>

  <script>
    const client = supabase.createClient(
      "https://ftgvhycaffzuwajihajz.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0Z3ZoeWNhZmZ6dXdhamloYWp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NDkzNzcsImV4cCI6MjA5NTAyNTM3N30.KgibDtXxGFhTEK33430fIcOa7kgqECrO0SohYq2idDU"
    );

    async function loadLevels() {

      const { data, error } = await client
        .from("levels")
        .select("*")
        .order("point_award", { ascending: false });

      const grid = document.getElementById("grid");

      if (error || !data) {
        grid.innerHTML = "<p>Failed to load levels</p>";
        console.log(error);
        return;
      }

      grid.innerHTML = "";

      data.forEach((lvl, index) => {

        // YouTube thumbnail (if video is YouTube link)
        let thumb = "";
        if (lvl.video_url?.includes("youtube.com") || lvl.video_url?.includes("youtu.be")) {
          const id = extractYouTubeID(lvl.video_url);
          thumb = `https://img.youtube.com/vi/${id}/hqdefault.jpg`;
        }

        const card = document.createElement("a");
        card.className = "level-card";
        card.href = `level.html?id=${lvl.id}`;

        card.innerHTML = `
          <img src="${thumb}" class="thumb" />
          <div class="info">
            <h3>#${index + 1} ${lvl.level_name}</h3>
            <p><b>Creator:</b> ${lvl.creator}</p>
            <p><b>ID:</b> ${lvl.ingame_id ?? "N/A"}</p>
            <p><b>Position:</b> ${index + 1}</p>
          </div>
        `;

        grid.appendChild(card);
      });
    }

    function extractYouTubeID(url) {
      const match = url.match(/(youtu\.be\/|v=)([^&?/]+)/);
      return match ? match[2] : "";
    }

    loadLevels();
  </script>

</body>
</html>
