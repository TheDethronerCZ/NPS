<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NPS - Levels</title>

  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

<a class="nps-top-left" href="index.html">
  <span class="nps-white">NPS</span>
  <span class="nps-sunset">vSUNSET</span>
</a>

<div class="page">

  <h1>Levels</h1>

  <div id="grid" class="grid">
    <p>Loading levels...</p>
  </div>

</div>

<script>
const supabase = window.supabase.createClient(
  "https://ftgvhycaffzuwajihajz.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0Z3ZoeWNhZmZ6dXdhamloYWp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NDkzNzcsImV4cCI6MjA5NTAyNTM3N30.KgibDtXxGFhTEK33430fIcOa7kgqECrO0SohYq2idDU"
);

async function loadLevels() {

  const grid = document.getElementById("grid");

  const { data, error } = await supabase
    .from("levels")
    .select("*");

  if (error) {
    grid.innerHTML = "<p>Failed to load levels</p>";
    return;
  }

  grid.innerHTML = "";

  data.forEach((lvl, i) => {

    const card = document.createElement("a");
    card.className = "level-card";
    card.href = `level.html?id=${lvl.id}`;

    card.innerHTML = `
      <img class="thumb" src="${lvl.thumbnail_url || ''}">
      <div>
        <h3>#${i + 1} ${lvl.level_name}</h3>
        <p>${lvl.creator}</p>
        <p>${lvl.difficulty}</p>
      </div>
    `;

    grid.appendChild(card);
  });
}

loadLevels();
</script>

</body>
</html>
