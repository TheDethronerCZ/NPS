<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Levels</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

<a class="nps-top-left" href="index.html">
  <span class="nps-white">NPS</span>
  <span class="nps-sunset">vSUNSET</span>
</a>

<div class="page">

  <h1>Levels</h1>

  <div id="levels" class="grid"></div>

</div>

<script>
window.supabaseClient = window.supabaseClient || window.supabase.createClient(
  "https://ftgvhycaffzuwajihajz.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0Z3ZoeWNhZmZ6dXdhamloYWp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NDkzNzcsImV4cCI6MjA5NTAyNTM3N30.KgibDtXxGFhTEK33430fIcOa7kgqECrO0SohYq2idDU"
);

async function loadLevels() {
  const { data } = await window.supabaseClient.from("levels").select("*");

  const container = document.getElementById("levels");
  container.innerHTML = "";

  data.forEach((lvl, i) => {
    const el = document.createElement("a");
    el.className = "level-card";
    el.href = "level.html?id=" + lvl.id;

    el.innerHTML = `
      <div>
        <h3>#${i + 1} ${lvl.name}</h3>
        <p>${lvl.creator}</p>
      </div>
    `;

    container.appendChild(el);
  });
}

loadLevels();
</script>

</body>
</html>
