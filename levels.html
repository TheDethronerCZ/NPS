<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>Levels • NPS Sunset</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <canvas id="bg"></canvas>

  <div class="sun-glow"></div>

  <div class="grid-overlay"></div>

  <audio id="bgMusic" loop>
    <source
      src="assets/audio/sunset.mp3"
      type="audio/mpeg">
  </audio>

  <header class="topbar">

    <a href="index.html" class="brand">
      NPS <span>SUNSET</span>
    </a>

    <div class="top-controls">

      <button id="musicToggle">
        MUSIC OFF
      </button>

      <button id="auraToggle">
        AURA OFF
      </button>

    </div>

  </header>

  <main class="menu-scene">

    <section class="hero">

      <h1>LEVELS</h1>

      <p>
        Community creations.
      </p>

    </section>

    <section class="panels">

      <div class="panel level-card">

        <h2>Sunset Pulse</h2>

        <p>
          Easy Demon • by Nova
        </p>

      </div>

      <div class="panel level-card">

        <h2>Afterglow</h2>

        <p>
          Medium Demon • by Hexa
        </p>

      </div>

      <div class="panel level-card">

        <h2>Crimson Void</h2>

        <p>
          Extreme Demon • by Skye
        </p>

      </div>

    </section>

  </main>

  <script src="scripts/particles.js"></script>
  <script src="scripts/audio.js"></script>
  <script src="scripts/core.js"></script>

</body>
</html>
