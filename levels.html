<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NPS - Level</title>

  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

<div class="page">

  <!-- BACK BUTTON -->
  <a class="btn" href="levels.html">← Back</a>

  <!-- LEVEL HEADER -->
  <div class="card" id="levelCard">
    <p>Loading level...</p>
  </div>

</div>

<script>
const client = supabase.createClient(
  "https://ftgvhycaffzuwajihajz.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0Z3ZoeWNhZmZ6dXdhamloYWp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NDkzNzcsImV4cCI6MjA5NTAyNTM3N30.KgibDtXxGFhTEK33430fIcOa7kgqECrO0SohYq2idDU"
);

// GET ID FROM URL
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

// DIFFICULTY COLORS
function difficultyColor(diff) {
  switch(diff) {
    case "Easy Demon": return "#4caf50";
    case "Medium Demon": return "#2196f3";
    case "Hard Demon": return "#ff9800";
    case "Insane Demon": return "#f44336";
    case "Extreme Demon": return "#9c27b0";
    default: return "white";
  }
}

// LOAD LEVEL
async function loadLevel() {

  const { data, error } = await client
    .from("levels")
    .select("*")
    .eq("id", id)
    .single();

  const card = document.getElementById("levelCard");

  if (error || !data) {
    card.innerHTML = "<p>Level not found</p>";
    return;
  }

  let videoEmbed = "";

  // YouTube embed
  if (data.video_url?.includes("youtube")) {
    const vid = extractID(data.video_url);
    videoEmbed = `
      <iframe width="100%" height="250"
        src="https://www.youtube.com/embed/${vid}"
        frameborder="0"
        allowfullscreen>
      </iframe>
    `;
  }

  const diffColor = difficultyColor(data.difficulty);

  card.innerHTML = `
    <h2>${data.level_name}</h2>

    <span style="
      background:${diffColor};
      color:white;
      padding:6px 12px;
      border-radius:10px;
      display:inline-block;
      margin-bottom:10px;
      font-size:14px;
    ">
      ${data.difficulty}
    </span>

    ${videoEmbed}

    <div style="margin-top:15px;">
      <p><b>Creator:</b> ${data.creator}</p>
      <p><b>Verifier:</b> ${data.verifier ?? "N/A"}</p>
      <p><b>In-game ID:</b> ${data.ingame_id ?? "N/A"}</p>
      <p><b>Points:</b> ${data.point_award ?? "0"}</p>
      <p><b>Length:</b> ${data.length ?? "Unknown"}</p>
    </div>

    <div style="margin-top:15px;">
      <p>${data.description ?? "No description provided."}</p>
    </div>
  `;
}

// EXTRACT YOUTUBE ID
function extractID(url) {
  const match = url.match(/(youtu\.be\/|v=)([^&]+)/);
  return match ? match[2] : "";
}

loadLevel();
</script>

</body>
</html>
