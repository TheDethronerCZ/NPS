// DIFFICULTY COLORS
function difficultyColor(diff) {
  switch(diff) {
    case "Easy Demon": return "#4caf50";
    case "Medium Demon": return "#2196f3";
    case "Hard Demon": return "#ff9800";
    case "Insane Demon": return "#f44336";
    case "Extreme Demon": return "#9c27b0";
    default: return "white";
  }
}

// LOAD LEVEL
async function loadLevels() {

  const grid = document.getElementById("grid");
  grid.innerHTML = "<p>Loading...</p>";

  const { data, error } = await supabase
    .from("levels")
    .select("*");

  if (error) {
    console.log("Supabase error:", error);
    grid.innerHTML = "<p>Failed to load levels</p>";
    return;
  }

  if (!data || data.length === 0) {
    grid.innerHTML = "<p>No levels found</p>";
    return;
  }

  grid.innerHTML = "";

  data.forEach((lvl, i) => {
    const card = document.createElement("a");
    card.className = "level-card";
    card.href = `level.html?id=${lvl.id}`;

    card.innerHTML = `
      <img class="thumb" src="${lvl.thumbnail_url || ''}">
      <div class="info">
        <h3>#${i + 1} ${lvl.level_name}</h3>
        <p>${lvl.creator}</p>
        <p>${lvl.difficulty}</p>
      </div>
    `;

    grid.appendChild(card);
  });
}

}
