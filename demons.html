<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demons</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <canvas id="bg"></canvas>
  <div class="sun-glow"></div>
  <div class="grid-overlay"></div>

  <audio id="bgMusic" loop>
    <source src="assets/audio/sunset.mp3">
  </audio>

  <header class="topbar">
    <div class="brand">NPS <span>SUNSET</span></div>
    <div class="top-controls">
      <button id="musicToggle">MUSIC</button>
      <button id="auraToggle">AURA</button>
    </div>
  </header>

  <main class="menu-scene">

    <section class="hero">
      <h1>DEMONS</h1>
    </section>

    <section class="panels">

      <div class="panel">Eclipse Core</div>
      <div class="panel">Solar Collapse</div>

    </section>

  </main>

  <script src="scripts/particles.js"></script>
  <script src="scripts/audio.js"></script>
  <script src="scripts/core.js"></script>

</body>

</html>
