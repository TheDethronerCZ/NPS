  Edit list
</button>
<script>
async function loadDemons() {

  const { data, error } = await sb
    .from("demons")
    .select("*");

  console.log(data, error);

  const list = document.getElementById("demonList");

  list.innerHTML = "";

  data?.forEach(d => {

    list.innerHTML += `
      <div class="card">
        <h2>${d.name}</h2>
        <p>${d.difficulty}</p>
        <p>Points: ${d.points}</p>
      </div>
    `;
  });
}

loadDemons();
</script>
