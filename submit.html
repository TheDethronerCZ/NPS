<!DOCTYPE html>
<html>
<div class="card admin-only" style="display:none;">
  <h2>Admin Panel</h2>

  <div id="submissionList"></div>
</div>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Submit</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<canvas id="bg"></canvas>
<div class="sunset-horizon"></div>
<script src="scripts/submit.js"></script>
<nav class="nav">
  <a href="index.html">Home</a>
  <a href="levels.html">Levels</a>
  <a href="demons.html">Demons</a>
  <a href="submit.html">Submit</a>
  <a href="leader.html">Leaderboard</a>
</nav>

<main class="page">

  <h1>Submit Level</h1>

<div class="card">

  <input id="levelName" placeholder="Level name">

  <select id="type">
    <option value="level">Level</option>
    <option value="verification">Verification</option>
  </select>

  <input id="enjoyability" type="number" placeholder="Enjoyability (1-10)">

  <button onclick="submitLevel()">
    Submit
  </button>

</div>

  <!-- admin panel -->
  <div class="card admin-only" style="display:none;">
    <h2>Admin Panel</h2>
    <p>Approve / reject submissions here</p>
  </div>

</main>

<button id="auraToggle" class="toggle-btn">AURA: OFF</button>
<button id="musicToggle" class="toggle-btn music-btn">MUSIC: OFF</button>

<audio id="bgMusic" loop>
  <source src="assets/music/sunset.mp3">
</audio>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="scripts/particles.js"></script>
<script src="scripts/ui.js"></script>
<script src="scripts/auth.js"></script>
<script src="scripts/admin.js"></script>

</body>
</html>
