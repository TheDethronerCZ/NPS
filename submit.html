<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>Submit • NPS Sunset</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <canvas id="bg"></canvas>

  <div class="sun-glow"></div>

  <div class="grid-overlay"></div>

  <audio id="bgMusic" loop>
    <source
      src="assets/audio/sunset.mp3"
      type="audio/mpeg">
  </audio>

  <header class="topbar">

    <a href="index.html" class="brand">
      NPS <span>SUNSET</span>
    </a>

    <div class="top-controls">

      <button id="musicToggle">
        MUSIC OFF
      </button>

      <button id="auraToggle">
        AURA OFF
      </button>

    </div>

  </header>

  <main class="menu-scene">

    <section class="hero">

      <h1>SUBMIT</h1>

      <p>
        Send your level to moderators.
      </p>

    </section>

    <section class="panels">

      <div class="panel">

        <input
          type="text"
          placeholder="Level Name">

        <select>

          <option>Easy Demon</option>
          <option>Medium Demon</option>
          <option>Hard Demon</option>
          <option>Insane Demon</option>
          <option>Extreme Demon</option>

        </select>

        <input
          type="text"
          placeholder="YouTube Link">

        <textarea
          placeholder="Description"></textarea>

        <button>
          SUBMIT
        </button>

      </div>

    </section>

  </main>

  <script src="scripts/particles.js"></script>
  <script src="scripts/audio.js"></script>
  <script src="scripts/core.js"></script>

</body>
</html>
