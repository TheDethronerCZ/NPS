<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Submit</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <canvas id="bg"></canvas>
  <div class="horizon"></div>

  <a class="logo" href="index.html">
    NPS v<span>SUNSET</span>
  </a>

  <nav class="nav">
    <a href="index.html">Home</a>
    <a href="demons.html">Demons</a>
    <a href="levels.html">Levels</a>
    <a href="submit.html">Submit</a>
    <a href="leader.html">Leaderboard</a>
    <a href="account.html">Account</a>
  </nav>

  <main class="page">

    <div class="card">

      <h2>Submit Completion</h2>

      <input
        id="levelName"
        placeholder="Level Name"
      >

      <input
        id="video"
        placeholder="YouTube Link"
      >

      <select id="submissionType">

        <option value="completion">
          Completion
        </option>

        <option value="verification">
          Verification
        </option>

      </select>

      <input
        id="enjoyability"
        type="number"
        min="1"
        max="10"
        placeholder="Enjoyability"
      >

      <button onclick="submitRun()">
        Submit
      </button>

    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>

</body>
</html>
